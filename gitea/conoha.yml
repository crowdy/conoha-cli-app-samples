name: gitea
# Replace with your own FQDN before running `conoha app init`.
# Only the root web host goes here. Subdomains (e.g. dex.example.com)
# are declared per-block under `expose:` below — listing them here too
# fails validation ("host duplicates an entry in hosts[]"). The proxy
# ACMEs both the root and each expose host independently as long as
# DNS A records exist for them.
hosts:
  - gitea.example.com
web:
  service: gitea
  # Gitea HTTP UI. Container also listens on 22 for git+ssh, but
  # conoha-proxy fronts HTTP only — see README for how to use git+ssh
  # via SSH-into-VPS + `docker exec` (the container's port 22 is on
  # the compose network, not the host).
  port: 3000
# Gitea has no `/up` (proxy default), but `/api/healthz` returns 200
# once the server is reachable — use it for the probe. First start
# runs DB migrations and can take ~30s, so allow a wider unhealthy
# window than the default 15s.
health:
  path: /api/healthz
  unhealthy_threshold: 24    # 24 × 5s = 120s
# Dex OIDC provider, exposed on its own subdomain so the browser
# discovery + redirect flow can reach it under HTTPS. See the
# blue_green note inside the block for why we override the spec's
# `false` recommendation here.
expose:
  - label: dex
    host: dex.example.com
    service: dex
    port: 5556
    # Spec §4.5.1 specifies `blue_green: false` for dex (sessions /
    # approval state aren't slot-aware). Conoha-cli ≤ v0.6.0 ships a
    # gap: blue_green:false expose blocks are routed to the accessory
    # project, which doesn't receive the slot override's host-port
    # mapping, so the proxy can't reach them. Until the CLI lands the
    # fix, keep this `true` — costs one extra dex per slot but is the
    # only setting that actually serves traffic.
    blue_green: true
    # Dex's default `/up` 404s; `/dex/healthz` returns 200 once OIDC is up.
    health:
      path: /dex/healthz
# `db` (PostgreSQL) only serves other compose services internally
# and shouldn't be duplicated per blue/green slot.
accessories:
  - db
