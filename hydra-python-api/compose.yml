services:
  # Ory Hydra — OAuth2 / OpenID Connect server.
  # Public API (:4444) is exposed via conoha.yml `expose:` block as
  # auth.example.com so the browser OAuth2 flow completes under HTTPS.
  # Admin API (:4445) stays internal — only `app` (token introspection)
  # and `setup.sh` (client CRUD via `docker compose exec`) use it.
  hydra:
    image: oryd/hydra:v2.2
    expose:
      - "4444"
      - "4445"
    # NOTE: do NOT add `URLS_SELF_ISSUER`, `URLS_LOGIN`, `URLS_CONSENT`,
    # or `SECRETS_SYSTEM` here. Compose's `environment:` interpolates
    # `${VAR:-default}` at parse time and overrides values supplied via
    # `env_file`. CLI's slot override injects `.env.server` as
    # `env_file`, so leaving these out lets the runtime values flow
    # through.
    #
    # `DSN` keeps its `${POSTGRES_PASSWORD:-hydra}` interpolation
    # because the db service shares the same default (so the connection
    # still works) — caveat documented in README. conoha-cli#166 will
    # let user-set values reach both services without sample-side
    # gymnastics.
    environment:
      - DSN=postgres://hydra:${POSTGRES_PASSWORD:-hydra}@db:5432/hydra?sslmode=disable
      - LOG_LEVEL=info
    command: serve all --dev
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Run database migrations before Hydra starts
  hydra-migrate:
    image: oryd/hydra:v2.2
    environment:
      - DSN=postgres://hydra:${POSTGRES_PASSWORD:-hydra}@db:5432/hydra?sslmode=disable
    command: migrate sql -e --yes
    depends_on:
      db:
        condition: service_healthy

  # Python app — Login/consent provider + protected API
  app:
    build: .
    # No host-side port: conoha-proxy injects 127.0.0.1:0:9010 at
    # deploy time so two slots (blue/green) can coexist.
    expose:
      - "9010"
    environment:
      - HYDRA_ADMIN_URL=http://hydra:4445/admin
    depends_on:
      - hydra

  # PostgreSQL for Hydra
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hydra}
      - POSTGRES_DB=hydra
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
