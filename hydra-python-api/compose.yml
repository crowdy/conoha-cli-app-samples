services:
  # Ory Hydra — OAuth2 / OpenID Connect server
  hydra:
    image: oryd/hydra:v2.2
    # ⚠ Internal only. Public OAuth2 API (4444) and Admin API (4445)
    # are on the compose network. Browser-driven OAuth2 flows that
    # redirect users to hydra:4444 don't work in this layout — see
    # README for workarounds.
    expose:
      - "4444"
      - "4445"
    environment:
      - DSN=postgres://hydra:hydra@db:5432/hydra?sslmode=disable
      - URLS_SELF_ISSUER=http://${SERVER_HOST}:4444
      - URLS_LOGIN=http://${SERVER_HOST}:9010/login
      - URLS_CONSENT=http://${SERVER_HOST}:9010/consent
      - SECRETS_SYSTEM=a-very-secret-key-that-must-be-changed
      - LOG_LEVEL=info
    command: serve all --dev
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Run database migrations before Hydra starts
  hydra-migrate:
    image: oryd/hydra:v2.2
    environment:
      - DSN=postgres://hydra:hydra@db:5432/hydra?sslmode=disable
    command: migrate sql -e --yes
    depends_on:
      db:
        condition: service_healthy

  # Python app — Login/consent provider + protected API
  app:
    build: .
    # No host-side port: conoha-proxy injects 127.0.0.1:0:9010 at
    # deploy time so two slots (blue/green) can coexist.
    expose:
      - "9010"
    environment:
      - HYDRA_ADMIN_URL=http://hydra:4445/admin
    depends_on:
      - hydra

  # PostgreSQL for Hydra
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=hydra
      - POSTGRES_DB=hydra
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
