<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorize</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #333;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1rem; font-size: 0.9rem; }
    .scope-list { margin-bottom: 1.5rem; }
    .scope-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
    }
    .scope-item input { width: auto; }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1565c0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Authorize</h1>
    <p><strong>{{ client_name }}</strong> is requesting access to your account.</p>
    <form method="post" action="/consent">
      <input type="hidden" name="consent_challenge" value="{{ challenge }}">
      <div class="scope-list">
        {% for scope in scopes %}
        <div class="scope-item">
          <input type="checkbox" name="grant_scope" value="{{ scope }}" id="scope_{{ scope }}" checked>
          <label for="scope_{{ scope }}">{{ scope }}</label>
        </div>
        {% endfor %}
      </div>
      <button type="submit">Allow Access</button>
    </form>
  </div>
</body>
</html>
