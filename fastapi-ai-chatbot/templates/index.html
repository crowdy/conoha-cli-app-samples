<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    #messages {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      background: #fff;
      margin-bottom: 1rem;
    }
    .msg { margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 4px; }
    .user { background: #e3f2fd; }
    .bot { background: #f5f5f5; }
    form { display: flex; gap: 0.5rem; }
    input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }
    button {
      padding: 0.5rem 1.5rem;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <h1>AI Chatbot</h1>
  <p>Powered by Ollama (tinyllama)</p>
  <div id="messages"></div>
  <form id="chatForm">
    <input type="text" id="input" placeholder="Type a message..." autocomplete="off" required>
    <button type="submit" id="btn">Send</button>
  </form>
  <script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const btn = document.getElementById("btn");

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      addMessage(msg, "user");
      input.value = "";
      btn.disabled = true;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        });
        const data = await res.json();
        addMessage(data.response, "bot");
      } catch {
        addMessage("Error: could not reach the server.", "bot");
      }
      btn.disabled = false;
      input.focus();
    });
  </script>
</body>
</html>
