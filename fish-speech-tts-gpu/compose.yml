services:
  fish-speech:
    image: fishaudio/fish-speech:latest-webui-cuda
    entrypoint: ["/bin/bash", "/app/custom-entrypoint.sh"]
    # No host-side ports: conoha-proxy injects 127.0.0.1:0:7860 (WebUI)
    # at deploy time. The 8080 API stays internal — accessible from
    # other containers on the compose network and via SSH tunnel
    # (`ssh -L 8080:localhost:8080 root@<server>` then run the bundled
    # CLI client locally), but not from the proxy.
    expose:
      - "7860"
      - "8080"
    volumes:
      - ./entrypoint.sh:/app/custom-entrypoint.sh:ro
      - model_data:/app/checkpoints
      - references:/app/references
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - COMPILE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    restart: unless-stopped

volumes:
  model_data:
  references:
