receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlphttp/quickwit:
    endpoint: http://quickwit:7280/otlp
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [otlphttp/quickwit]
    traces:
      receivers: [otlp]
      exporters: [otlphttp/quickwit]
