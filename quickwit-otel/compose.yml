services:
  quickwit:
    image: quickwit/quickwit:latest
    # Internal only — Grafana queries quickwit:7280 over the compose
    # network as a data source. Direct quickwit UI access requires
    # docker exec on the VPS.
    expose:
      - "7280"
      - "7281"
    environment:
      - QW_ENABLE_OTLP_ENDPOINT=true
    volumes:
      - quickwit_data:/quickwit/qwdata
    command: run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7280/health/livez"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    # ⚠ OTLP gRPC (4317) and HTTP (4318) are internal-only in this
    # layout. External telemetry agents can't reach this endpoint.
    # Agents running on the same VPS push to `otel-collector:4317`
    # over the compose network.
    expose:
      - "4317"
      - "4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      quickwit:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    # No host-side port: conoha-proxy injects 127.0.0.1:0:3000 at
    # deploy time so two slots (blue/green) can coexist.
    expose:
      - "3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      quickwit:
        condition: service_healthy

volumes:
  quickwit_data:
  grafana_data:
