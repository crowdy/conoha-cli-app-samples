services:
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    # No host-side port: conoha-proxy injects 127.0.0.1:0:3000 at
    # deploy time so two slots (blue/green) can coexist.
    expose:
      - "3000"
    # NOTE: `NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY` and `CLERK_SECRET_KEY`
    # stay here because Next.js standalone bakes the publishable key
    # into the build (see `args:` above) and the secret key needs to
    # reach the server-rendering process. Compose's `${VAR}` (no
    # default) does not override env_file when env_file provides the
    # value — but it leaves nothing in scope when env_file is absent
    # (e.g. local `docker compose up`), so we keep the interpolation
    # for dev-mode parity.
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - BACKEND_INTERNAL_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
      - NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/dashboard
      - NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/dashboard
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    # Exposed externally on api.example.com via conoha.yml `expose:` so
    # Clerk / Stripe can POST webhooks with intact body bytes (Next.js
    # rewrites would mutate the body and break HMAC verification).
    expose:
      - "8000"
    # NOTE: do NOT add `STRIPE_SECRET_KEY` / `STRIPE_WEBHOOK_SECRET` /
    # `CLERK_WEBHOOK_SECRET` / `CLERK_JWKS_URL` / `STRIPE_PRO_PRICE_ID`
    # / `STRIPE_ENTERPRISE_PRICE_ID` to `environment:` — compose's
    # `${VAR}` interpolates at parse time and overrides values supplied
    # via `env_file`. CLI's slot override injects `.env.server` as
    # `env_file`, so leaving these out lets `conoha app env set` values
    # flow through. `DATABASE_URL` stays because it's purely an
    # internal compose-network address with the same default the `db`
    # service uses.
    environment:
      - DATABASE_URL=postgresql+asyncpg://appuser:apppass@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
