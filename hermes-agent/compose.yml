services:
  gateway:
    image: nousresearch/hermes-agent
    command: gateway run
    restart: unless-stopped
    mem_limit: 4g
    cpus: 2
    shm_size: 1g
    expose:
      - "8642"
    volumes:
      - hermes_data:/opt/data
      - ./config/config.yaml:/opt/data/config.yaml
      - ./config/SOUL.md:/opt/data/SOUL.md:ro
    environment:
      # ANTHROPIC_API_KEY and API_SERVER_KEY come from `conoha app env
      # set` on the VPS. Defaults left empty so misconfiguration
      # surfaces as an API error instead of silently using a fake key.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - GATEWAY_ALLOW_ALL_USERS=true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8642/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    # gateway's 8642 stays on the compose network only — nginx in this
    # sample fronts both `gateway` and `dashboard` and is the only
    # service exposed via conoha-proxy.

  dashboard:
    image: nousresearch/hermes-agent
    command: dashboard --host 0.0.0.0 --insecure --no-open
    restart: unless-stopped
    expose:
      - "9119"
    volumes:
      - hermes_data:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://gateway:8642
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9119/')"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      gateway:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # No host-side port: conoha-proxy injects 127.0.0.1:0:80 at deploy
    # time so two slots (blue/green) can coexist.
    expose:
      - "80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      dashboard:
        condition: service_healthy

volumes:
  hermes_data:
