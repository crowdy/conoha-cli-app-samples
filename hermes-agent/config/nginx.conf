map $cookie_hermes_auth $auth_bypass {
    "authenticated" "off";
    default         "Hermes Agent";
}

server {
    listen 80;

    # HTML and static assets — always require Basic Auth, set session cookie
    location / {
        auth_basic "Hermes Agent";
        auth_basic_user_file /etc/nginx/.htpasswd;

        add_header Set-Cookie "hermes_auth=authenticated; Path=/; HttpOnly; SameSite=Strict" always;

        proxy_pass http://dashboard:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API paths — accept session cookie OR Basic Auth
    # SPA fetch() doesn't send Basic Auth, but does send cookies
    location /api/ {
        auth_basic $auth_bypass;
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://dashboard:9119;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
