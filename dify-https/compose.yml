services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  api:
    image: langgenius/dify-api:0.15
    environment:
      - MODE=api
      - SECRET_KEY=${SECRET_KEY:-sk-dify-secret-key-change-me}
      - DB_USERNAME=dify
      - DB_PASSWORD=${DB_PASSWORD:-difyai}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-difyai}
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    image: langgenius/dify-api:0.15
    environment:
      - MODE=worker
      - SECRET_KEY=${SECRET_KEY:-sk-dify-secret-key-change-me}
      - DB_USERNAME=dify
      - DB_PASSWORD=${DB_PASSWORD:-difyai}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-difyai}
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    image: langgenius/dify-web:0.15
    environment:
      - CONSOLE_API_URL=
      - APP_API_URL=
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=dify
      - POSTGRES_PASSWORD=${DB_PASSWORD:-difyai}
      - POSTGRES_DB=dify
    volumes:
      - dify_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai}
    volumes:
      - dify_redis:/data

volumes:
  dify_storage:
  dify_db:
  dify_redis:
