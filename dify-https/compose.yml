services:
  nginx:
    image: nginx:1.27-alpine
    # No host-side port: conoha-proxy injects 127.0.0.1:0:80 at deploy
    # time so two slots (blue/green) can coexist.
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  api:
    image: langgenius/dify-api:0.15.8
    environment:
      - MODE=api
      - DB_USERNAME=dify
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
      # NOTE: SECRET_KEY / DB_PASSWORD / REDIS_PASSWORD / CONSOLE_API_URL
      # / APP_API_URL / SERVICE_API_URL / APP_WEB_URL come from env_file
      # (`.env.server`) so `conoha app env set` actually takes effect.
      # Leaving them in `environment:` with `${VAR:-default}` would let
      # compose's interpolation win (see conoha-cli#166).
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    image: langgenius/dify-api:0.15.8
    environment:
      - MODE=worker
      - DB_USERNAME=dify
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
      # See `api.environment` note re: env_file precedence.
    volumes:
      - dify_storage:/app/api/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    image: langgenius/dify-web:0.15.8
    # CONSOLE_API_URL / APP_API_URL come from env_file (`.env.server`).
    # They're baked into the browser-side bundle and must point at the
    # api subdomain (https://api.example.com) — see README.
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=dify
      - POSTGRES_PASSWORD=${DB_PASSWORD:-difyai}
      - POSTGRES_DB=dify
    volumes:
      - dify_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai}
    volumes:
      - dify_redis:/data

volumes:
  dify_storage:
  dify_db:
  dify_redis:
