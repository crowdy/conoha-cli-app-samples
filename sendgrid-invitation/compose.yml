services:
  nginx:
    image: nginx:alpine
    # No host-side port: conoha-proxy injects 127.0.0.1:0:80 at deploy
    # time so two slots (blue/green) can coexist.
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    expose:
      - "3000"

  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      # Values come from `conoha app env set` (no `.env.server` file
      # on the VPS); fallback defaults here would send mail from a
      # bogus address, so leave them empty and let the app surface the
      # missing-config error loudly on first request.
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
      - FROM_NAME=${FROM_NAME:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
