services:
  proxy:
    image: nginx:alpine
    # No host-side port: conoha-proxy injects 127.0.0.1:0:80 at deploy
    # time so two slots (blue/green) can coexist. Publishing here
    # would conflict.
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2

  app1:
    build: ./app1

  app2:
    build: ./app2
