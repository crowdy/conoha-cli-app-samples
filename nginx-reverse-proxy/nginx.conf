# ============================================================
# Rate Limiting
# - 1 IP あたり秒間 10 リクエスト許可、バースト 20 まで待機列許可
# ============================================================
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# ============================================================
# IP Blocklist / Allowlist
# - ブロックする IP をここに追加 (1 = blocked)
# ============================================================
geo $blocked_ip {
    default 0;
    # 192.168.100.0/24 1;   # example: block this subnet
    # 10.0.0.5 1;            # example: block single IP
}

# ============================================================
# Upstreams
# ============================================================
upstream app1 {
    server app1:3000;
}

upstream app2 {
    server app2:8000;
}

server {
    listen 80;
    server_name _;

    # ========================================================
    # IP Filtering - ブロック対象 IP に 403 を返す
    # ========================================================
    if ($blocked_ip) {
        return 403;
    }

    # ========================================================
    # Security Headers - すべてのレスポンスに付与
    # ========================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========================================================
    # Custom Header - どのプロキシを経由したか表示
    # ========================================================
    add_header X-Served-By "nginx-reverse-proxy-demo" always;

    # ========================================================
    # Frontend (App 1 - Node.js)
    # ========================================================
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://app1;

        # -- Forwarded headers（標準） --
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # -- Request ID（トレーシング用） --
        proxy_set_header X-Request-ID      $request_id;
    }

    # ========================================================
    # API (App 2 - Python)
    # - より厳しい rate limit を適用
    # ========================================================
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://app2;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Request-ID      $request_id;

        # -- CORS headers --
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ========================================================
    # 機密パスのブロック
    # ========================================================
    location ~ /\.(env|git|htpasswd) {
        return 404;
    }

    # ========================================================
    # Health check endpoint（nginx 自体が応答）
    # ========================================================
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ========================================================
    # Headers debug endpoint - プロキシが転送するヘッダー確認用
    # ========================================================
    location /debug/headers {
        proxy_pass http://app2;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header X-Request-ID      $request_id;
    }
}
