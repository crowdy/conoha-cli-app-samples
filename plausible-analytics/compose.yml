services:
  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.5
    # No host-side port: conoha-proxy injects a randomly-bound
    # 127.0.0.1:0:8000 mapping at deploy time so two slots (blue/green)
    # can coexist. Publishing explicitly here would conflict.
    expose:
      - "8000"
    environment:
      - BASE_URL=${BASE_URL:?BASE_URL must be set to your public FQDN via conoha app env set — Plausible generates tracking script paths and OAuth redirects from this value}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-please-change-me-to-a-random-64-char-string-use-openssl-rand-base64-48}
      - DATABASE_URL=postgres://plausible:${DB_PASSWORD:-plausible}@db:5432/plausible
      - CLICKHOUSE_DATABASE_URL=http://clickhouse:8123/plausible
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=${DB_PASSWORD:-plausible}
      - POSTGRES_DB=plausible
    volumes:
      - plausible_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    volumes:
      - plausible_events:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  plausible_db:
  plausible_events:
