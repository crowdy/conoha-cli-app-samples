services:
  web:
    build: .
    # No host-side port: conoha-proxy injects a randomly-bound
    # 127.0.0.1:0:3000 mapping at deploy time for blue/green discovery.
    expose:
      - "3000"
    environment:
      - MONGO_URL=mongodb://db:27017/app
    depends_on:
      - db

  db:
    image: mongo:8
    volumes:
      - db_data:/data/db

volumes:
  db_data:
