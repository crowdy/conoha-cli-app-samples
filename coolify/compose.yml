services:
  coolify:
    # Coolify v4 is still in beta at time of writing; there is no :4
    # moving tag in ghcr, only concrete beta tags (and :latest / :v3
    # which point at v3). Pin to a published v4 beta so `docker pull`
    # resolves. Bump to a newer beta or switch to :latest once Coolify
    # 4.0.0 ships a stable tag.
    image: ghcr.io/coollabsio/coolify:4.0.0-beta.473
    # No host-side ports: conoha-proxy injects 127.0.0.1:0:8000 (HTTP)
    # at deploy time. Ports 6001 (Soketi / socket.io) and 6002
    # (Laravel Reverb / WebSocket) stay on the compose network only —
    # the proxy fronts a single HTTP port per service, so realtime UI
    # updates that depend on these ports may not work via the public
    # FQDN. See README for the recommended workaround.
    expose:
      - "8000"
      - "6001"
      - "6002"
    environment:
      - APP_ID=${APP_ID:-coolify}
      - APP_KEY=${APP_KEY:-}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_PASSWORD=${DB_PASSWORD:-coolify}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-coolify}
    volumes:
      - /data/coolify:/data/coolify
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=coolify
      - POSTGRES_PASSWORD=${DB_PASSWORD:-coolify}
      - POSTGRES_DB=coolify
    volumes:
      - coolify_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coolify"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-coolify}
    volumes:
      - coolify_redis:/data
    restart: unless-stopped

volumes:
  coolify_db:
  coolify_redis:
