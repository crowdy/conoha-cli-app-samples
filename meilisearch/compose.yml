services:
  meilisearch:
    image: getmeili/meilisearch:v1.13
    # No host-side port: conoha-proxy injects a randomly-bound
    # 127.0.0.1:0:7700 mapping at deploy time so two slots (blue/green)
    # can coexist. Publishing explicitly here would conflict.
    expose:
      - "7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-change-me-to-a-secure-master-key}
      - MEILI_ENV=production
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  meilisearch_data:
